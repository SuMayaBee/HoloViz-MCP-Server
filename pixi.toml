[workspace]
name = "holoviz-mcp-server"
version = "0.1.0"
description = "MCP server for HoloViz ecosystem"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.11,<3.14"
panel = ">=1.5.0"
holoviews = ">=1.18.0"
hvplot = ">=0.10.0"
bokeh = ">=3.4.0"
pandas = ">=2.0"
psutil = "*"
requests = "*"
ruff = "*"
pip = "*"
hatchling = "*"
hatch-vcs = "*"
typer = "*"
pydantic = ">=2.0"

[tasks]
postinstall = "pip install --no-build-isolation --no-deps -e . && pip install fastmcp"
test = "pytest tests/ -v"
test-coverage = "pytest tests/ -v --cov=holoviz_mcp_server --cov-report=term-missing"
lint = "ruff check src/ && ruff format --check src/"
format = "ruff format src/ && ruff check --fix src/"

[feature.dev.dependencies]
pytest = "*"
pytest-asyncio = "*"
mypy = "*"
pre-commit = "*"

[feature.dev]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[environments]
default = { features = ["dev"], solve-group = "default" }
