# HoloViz MCP Server — https://github.com/SuMayaBee/HoloViz-MCP-Server
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      port:
        type: integer
        description: Port for the Panel display server (default 5077)
        default: 5077
    additionalProperties: false
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: [
        "holoviz-mcp-server",
        "mcp"
      ],
      env: {
        ...(config.port ? { HOLOVIZ_MCP_SERVER_PORT: String(config.port) } : {})
      }
    })
