<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HoloViz MCP App</title>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-3.9.0.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-gl-3.9.0.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-widgets-3.9.0.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-tables-3.9.0.min.js" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e0e0e0; --text-muted: #94a3b8; --accent: #818cf8;
      --danger: #f87171; --btn-bg: #1e293b; --btn-border: #334155;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }

    .toolbar {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .toolbar-btn {
      background: var(--btn-bg); color: var(--text-muted); border: 1px solid var(--btn-border);
      padding: 3px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: all 0.15s;
    }
    .toolbar-btn:hover { border-color: var(--accent); color: var(--accent); }
    .toolbar .spacer { flex: 1; }

    #chart-container { width: 100%; min-height: 350px; padding: 10px; }

    #insight-bar {
      display: none; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3);
      border-radius: 6px; padding: 8px 12px; margin: 6px 10px; font-size: 13px;
      color: #93c5fd; white-space: pre-line;
    }
    .loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; min-height: 300px; color: var(--text-muted); font-size: 13px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .error-box { text-align: center; padding: 40px; color: var(--danger); }

    .export-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .export-modal-inner {
      background: var(--btn-bg); border-radius: 8px; padding: 16px;
      width: 80%; max-height: 80%; overflow: auto; border: 1px solid var(--border);
    }
    .export-textarea {
      width: 100%; height: 280px; background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px; padding: 8px;
      font-family: monospace; font-size: 11px; resize: vertical;
    }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar" style="display:none;">
    <button class="toolbar-btn" id="btn-theme">Light Mode</button>
    <div class="spacer"></div>
  </div>

  <div id="chart-container">
    <div class="loading">
      <div class="spinner"></div>
      <span>Preparing visualization...</span>
    </div>
  </div>

  <div id="insight-bar"></div>

  <script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@1.3.1/dist/src/app-with-deps";

    const app = new App({ name: "HoloViz MCP App", version: "0.1.0" });
    const chartContainer = document.getElementById("chart-container");

    function clearChart() {
      if (window.Bokeh && Bokeh.index) {
        for (const [id, view] of [...Bokeh.index]) {
          if (chartContainer.contains(view.el)) {
            try { view.remove(); } catch {}
            Bokeh.index.delete(id);
          }
        }
      }
      chartContainer.innerHTML = "";
    }
    const insightBar = document.getElementById("insight-bar");
    let currentVizId = null;
    let currentTheme = "dark";

    // ── Theme toggle ─────────────────────────────────────────────────────────
    window.toggleTheme = async () => {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      document.getElementById("btn-theme").textContent = currentTheme === "dark" ? "Light Mode" : "Dark Mode";

      if (currentVizId) {
        try {
          const response = await app.callServerTool({
            name: "set_theme",
            arguments: { viz_id: currentVizId, theme: currentTheme },
          });
          const t = response?.content?.find(c => c.type === "text");
          if (t) {
            const r = JSON.parse(t.text);
            if (r.action === "theme_change" && r.figure) {
              clearChart();
              await Bokeh.embed.embed_item(r.figure);
              return;
            }
          }
        } catch (err) { console.log("Theme switch:", err); }
      }
      // Fallback for raw show() charts (not in viz store) — CSS filter invert
      chartContainer.style.filter = currentTheme === "light" ? "invert(1) hue-rotate(180deg)" : "";
    };

    document.getElementById("btn-theme").addEventListener("click", toggleTheme);

    // ── Save PNG ──────────────────────────────────────────────────────────────
    window.exportPNG = () => {
      const canvas = document.querySelector("#chart-container canvas");
      if (!canvas) { alert("No chart canvas found"); return; }
      const link = document.createElement("a");
      link.download = "chart.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    };

    // ── Export CSV ────────────────────────────────────────────────────────────
    window.exportCSV = async () => {
      if (!currentVizId) return;
      try {
        const response = await app.callServerTool({
          name: "export_data",
          arguments: { viz_id: currentVizId, format: "csv" },
        });
        const t = response?.content?.find(c => c.type === "text");
        if (!t) return;
        const result = JSON.parse(t.text);
        if (result.action === "export") {
          _downloadOrModal(result.data, result.filename, "text/csv", "Export Data (CSV)");
        }
      } catch (err) { console.error("Export error:", err); }
    };

    function _downloadOrModal(data, filename, mime, label) {
      try {
        const blob = new Blob([data], { type: mime });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url; link.download = filename; link.click();
        URL.revokeObjectURL(url);
      } catch {
        const modal = document.createElement("div");
        modal.className = "export-modal";
        modal.innerHTML =
          '<div class="export-modal-inner">' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:8px;">' +
          '<span>' + label + '</span>' +
          '<button onclick="this.closest(\'.export-modal\').remove()" class="toolbar-btn">Close</button></div>' +
          '<textarea class="export-textarea">' + data.replace(/</g, "&lt;") + "</textarea></div>";
        document.body.appendChild(modal);
      }
    }

    // ── Bokeh TapTool → handle_interaction ────────────────────────────────────
    window.addEventListener("bokeh-tap", async (e) => {
      if (!currentVizId) return;
      try {
        const response = await app.callServerTool({
          name: "handle_interaction",
          arguments: {
            viz_id: currentVizId,
            point_index: e.detail.index || 0,
            x_value: String(e.detail.xValue || ""),
            y_value: Number(e.detail.yValue || 0),
          },
        });
        const t = response?.content?.find((c) => c.type === "text");
        if (t) {
          try {
            const r = JSON.parse(t.text);
            if (r.action === "insight" && r.message) {
              insightBar.textContent = r.message;
              insightBar.style.display = "block";
            }
          } catch {}
        }
      } catch (err) { console.log("Click handler:", err); }
    });

    // ── Tool result handler ───────────────────────────────────────────────────
    app.ontoolresult = async ({ content, isError }) => {
      const textContent = content?.find((c) => c.type === "text");
      if (!textContent) return;

      if (isError) {
        chartContainer.innerHTML = "";
        return;
      }

      let result;
      try { result = JSON.parse(textContent.text); } catch {
        // Tool returned non-JSON (error message) — clear the spinner
        chartContainer.innerHTML = "";
        return;
      }

      if (result.action === "create" || result.action === "update") {
        currentVizId = result.viz_id || result.id || null;
        document.getElementById("toolbar").style.display = "flex";
        clearChart();
        chartContainer.innerHTML = '<div class="loading"><div class="spinner"></div><span>Rendering chart...</span></div>';
        try {
          clearChart();
          await Bokeh.embed.embed_item(result.figure);
          insightBar.style.display = "none";
        } catch (err) {
          chartContainer.innerHTML = '<div class="error-box">Render error: ' + err.message + "</div>";
        }

      } else if (result.action === "panel_url" && result.url) {
        currentVizId = result.viz_id || null;
        document.getElementById("toolbar").style.display = "flex";
        chartContainer.innerHTML = "";
        const frame = document.createElement("iframe");
        frame.src = result.url;
        frame.id = "panel-iframe";
        frame.style.cssText = "width:100%;height:900px;border:none;display:block;";
        chartContainer.appendChild(frame);
        insightBar.style.display = "none";

      } else if (result.action === "theme_change" && result.figure) {
        clearChart();
        try { await Bokeh.embed.embed_item(result.figure); } catch (err) {
          chartContainer.innerHTML = '<div class="error-box">Theme error: ' + err.message + "</div>";
        }

      } else if (result.action === "export") {
        const mime = result.format === "csv" ? "text/csv" : "application/json";
        _downloadOrModal(result.data, result.filename, mime, "Export Data (" + result.format.toUpperCase() + ")");

      } else if (result.action === "insight" && result.message) {
        insightBar.textContent = result.message;
        insightBar.style.display = "block";

      } else if (result.action === "error") {
        chartContainer.innerHTML = '<div class="error-box">' + result.message + "</div>";
      }
    };

    // Auto-resize Panel iframe when the Panel page reports its height
    window.addEventListener("message", (e) => {
      if (e.data?.type === "iframe-resize") {
        const frame = document.getElementById("panel-iframe");
        if (frame) frame.style.height = Math.max(e.data.height, 500) + "px";
      }
    });

    await app.connect();
  </script>
</body>
</html>
