<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HoloViz MCP App</title>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-3.9.0.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-gl-3.9.0.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-widgets-3.9.0.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-tables-3.9.0.min.js" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e0e0e0; --text-muted: #94a3b8; --accent: #818cf8;
      --danger: #f87171;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }

    .toolbar {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .toolbar button {
      background: transparent; color: var(--text-muted); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .toolbar button:hover { background: var(--border); color: var(--text); }
    .toolbar .spacer { flex: 1; }
    .toolbar .status { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .toolbar .open-link {
      font-size: 12px; color: var(--accent); text-decoration: none;
      border: 1px solid var(--accent); padding: 4px 10px; border-radius: 4px;
      transition: all 0.15s; white-space: nowrap;
    }
    .toolbar .open-link:hover { background: var(--accent); color: #fff; }

    #chart-container { width: 100%; min-height: 350px; padding: 10px; }

    /* Dark mode inverts the entire chart area (works on canvas, iframe, and shadow DOM). */
    #chart-container.dark { filter: invert(1) hue-rotate(180deg); }

    #insight-bar {
      display: none; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3);
      border-radius: 6px; padding: 8px 12px; margin: 6px 10px; font-size: 13px;
      color: #93c5fd; white-space: pre-line;
    }
    .loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; min-height: 300px; color: var(--text-muted); font-size: 13px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .error-box { text-align: center; padding: 40px; color: var(--danger); }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="btn-theme">Theme</button>
    <div class="spacer"></div>
    <a id="btn-open" class="open-link" href="#" target="_blank" style="display:none">Open visualization</a>
    <span id="status" class="status">Connecting...</span>
  </div>

  <div id="chart-container" class="dark">
    <div class="loading">
      <div class="spinner"></div>
      <span>Preparing visualization...</span>
    </div>
  </div>

  <div id="insight-bar"></div>

  <script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@1.3.1/dist/src/app-with-deps";

    const app = new App({ name: "HoloViz MCP App", version: "0.1.0" });
    const chartContainer = document.getElementById("chart-container");
    const statusEl = document.getElementById("status");
    const insightBar = document.getElementById("insight-bar");
    const btnOpen = document.getElementById("btn-open");
    let currentVizId = null;
    let isDark = true;

    function applyTheme() {
      // UI chrome
      document.documentElement.style.setProperty("--bg",       isDark ? "#0f172a" : "#ffffff");
      document.documentElement.style.setProperty("--surface",  isDark ? "#1e293b" : "#f1f5f9");
      document.documentElement.style.setProperty("--border",   isDark ? "#334155" : "#cbd5e1");
      document.documentElement.style.setProperty("--text",     isDark ? "#e0e0e0" : "#1e293b");
      document.documentElement.style.setProperty("--text-muted", isDark ? "#94a3b8" : "#64748b");
      // Chart area — toggling the CSS class on the container is enough;
      // filter on the container affects its entire painted output including canvas/shadow-DOM.
      chartContainer.classList.toggle("dark", isDark);
    }

    document.getElementById("btn-theme").addEventListener("click", () => {
      isDark = !isDark;
      applyTheme();
    });

    // Handle click events from Bokeh TapTool
    window.addEventListener("bokeh-tap", async (e) => {
      if (!currentVizId) return;
      try {
        const response = await app.callServerTool({
          name: "handle_interaction",
          arguments: {
            viz_id: currentVizId,
            point_index: e.detail.index || 0,
            x_value: String(e.detail.xValue || ""),
            y_value: Number(e.detail.yValue || 0),
          },
        });
        const t = response?.content?.find((c) => c.type === "text");
        if (t) {
          try {
            const r = JSON.parse(t.text);
            if (r.action === "insight" && r.message) {
              insightBar.textContent = r.message;
              insightBar.style.display = "block";
            }
          } catch {}
        }
      } catch (err) {
        console.log("Click handler:", err);
      }
    });

    // Receive tool results from the LLM
    app.ontoolresult = async ({ content }) => {
      const textContent = content?.find((c) => c.type === "text");
      if (!textContent) return;

      let result;
      try {
        result = JSON.parse(textContent.text);
      } catch {
        return;
      }

      if (result.action === "create" && result.figure) {
        // Pure HoloViews/hvPlot — rendered client-side by BokehJS
        currentVizId = result.viz_id || null;
        if (result.url) { btnOpen.href = result.url; btnOpen.style.display = ""; }
        chartContainer.innerHTML = '<div class="loading"><div class="spinner"></div><span>Rendering chart...</span></div>';
        try {
          chartContainer.innerHTML = "";
          await Bokeh.embed.embed_item(result.figure);
          statusEl.textContent = result.name || "Visualization created";
          insightBar.style.display = "none";
        } catch (err) {
          chartContainer.innerHTML = '<div class="error-box">Render error: ' + err.message + "</div>";
          statusEl.textContent = "Render error";
        }

      } else if (result.action === "panel_url" && result.url) {
        // Panel widget — load live Panel server in iframe
        currentVizId = result.viz_id || null;
        btnOpen.href = result.url; btnOpen.style.display = "";
        chartContainer.innerHTML = "";
        const frame = document.createElement("iframe");
        frame.src = result.url;
        frame.style.cssText = "width:100%;height:500px;border:none;";
        chartContainer.appendChild(frame);
        statusEl.textContent = result.name || "Visualization loaded";
        insightBar.style.display = "none";

      } else if (result.action === "insight" && result.message) {
        insightBar.textContent = result.message;
        insightBar.style.display = "block";

      } else if (result.url) {
        // Fallback
        btnOpen.href = result.url; btnOpen.style.display = "";
        statusEl.textContent = result.name || "Ready";
      }
    };

    await app.connect();
    statusEl.textContent = "Connected - ready";
  </script>
</body>
</html>
