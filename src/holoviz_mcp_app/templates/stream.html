<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <title>HoloViz MCP App — Stream</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e0e0e0; --text-muted: #94a3b8; --accent: #818cf8;
      --success: #4ade80;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 0; }

    .toolbar {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .toolbar button {
      background: transparent; color: var(--text-muted); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
    }
    .toolbar button:hover { background: var(--border); color: var(--text); }
    .toolbar .spacer { flex: 1; }
    .toolbar .status { font-size: 11px; color: var(--text-muted); }

    .live-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--success); font-weight: bold;
    }
    .live-dot {
      width: 8px; height: 8px; background: var(--success); border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    #stream-frame {
      width: 100%; border: none; background: var(--bg);
      height: calc(100vh - 42px);
    }

    .loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; min-height: 400px; color: var(--text-muted); font-size: 13px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="live-badge"><span class="live-dot"></span> LIVE</span>
    <button id="btn-pause">⏸ Pause</button>
    <button id="btn-theme">🌓 Theme</button>
    <div class="spacer"></div>
    <span id="status" class="status">Connecting...</span>
  </div>

  <div id="stream-container">
    <div class="loading">
      <div class="spinner"></div>
      <span>Preparing stream...</span>
    </div>
  </div>

  <script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";

    const app = new App({ name: "HoloViz Stream", version: "0.1.0" });
    let isPaused = false;
    let currentVizId = null;

    document.getElementById("btn-pause").addEventListener("click", async () => {
      isPaused = !isPaused;
      document.getElementById("btn-pause").textContent = isPaused ? "▶ Resume" : "⏸ Pause";

      if (currentVizId) {
        try {
          await app.callServerTool({
            name: "pause_stream",
            arguments: { viz_id: currentVizId, paused: isPaused },
          });
        } catch (err) { console.log("Pause error:", err); }
      }
    });

    app.ontoolresult = async ({ content }) => {
      const textContent = content?.find(c => c.type === "text");
      if (!textContent) return;

      let result;
      try { result = JSON.parse(textContent.text); } catch { return; }

      if (result.static_html || result.url) {
        currentVizId = result.viz_id || null;
        const container = document.getElementById("stream-container");
        container.innerHTML = "";

        const frame = document.createElement("iframe");
        frame.id = "stream-frame";

        if (result.static_html) {
          frame.srcdoc = result.static_html;
        } else {
          frame.src = result.url;
        }

        container.appendChild(frame);

        document.getElementById("status").textContent = result.name || "Stream active";
      }
    };

    await app.connect();
    document.getElementById("status").textContent = "Connected — ready for stream";
  </script>
</body>
</html>
