<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <title>HoloViz MCP App</title>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-3.9.0.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-gl-3.9.0.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-widgets-3.9.0.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-tables-3.9.0.min.js" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e0e0e0; --text-muted: #94a3b8; --accent: #818cf8;
      --success: #4ade80; --warning: #fbbf24; --danger: #f87171;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 0; }

    .toolbar {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .toolbar button {
      background: transparent; color: var(--text-muted); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .toolbar button:hover { background: var(--border); color: var(--text); }
    .toolbar .spacer { flex: 1; }
    .toolbar .status { font-size: 11px; color: var(--text-muted); }

    #chart-container {
      width: 100%; min-height: 350px; padding: 10px;
    }

    #insight-bar {
      display: none; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3);
      border-radius: 6px; padding: 8px 12px; margin: 6px 10px; font-size: 13px;
      color: #93c5fd; white-space: pre-line;
    }

    .loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; min-height: 300px; color: var(--text-muted); font-size: 13px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    .error-box {
      text-align: center; padding: 40px; color: var(--danger);
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="btn-theme" title="Toggle theme">Theme</button>
    <div class="spacer"></div>
    <span id="status" class="status">Connecting...</span>
  </div>

  <div id="chart-container">
    <div class="loading">
      <div class="spinner"></div>
      <span>Preparing visualization...</span>
    </div>
  </div>

  <div id="insight-bar"></div>

  <script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";

    const app = new App({ name: "HoloViz MCP App", version: "0.1.0" });
    let currentVizId = null;
    let isDark = true;

    document.getElementById("btn-theme").addEventListener("click", () => {
      isDark = !isDark;
      document.documentElement.style.setProperty("--bg", isDark ? "#0f172a" : "#ffffff");
      document.documentElement.style.setProperty("--surface", isDark ? "#1e293b" : "#f1f5f9");
      document.documentElement.style.setProperty("--border", isDark ? "#334155" : "#cbd5e1");
      document.documentElement.style.setProperty("--text", isDark ? "#e0e0e0" : "#1e293b");
      document.documentElement.style.setProperty("--text-muted", isDark ? "#94a3b8" : "#64748b");
    });

    // Handle click events from Bokeh TapTool
    window.addEventListener("bokeh-tap", async (e) => {
      if (!currentVizId) return;
      try {
        const response = await app.callServerTool({
          name: "handle_interaction",
          arguments: {
            viz_id: currentVizId,
            point_index: e.detail.index || 0,
            x_value: String(e.detail.xValue || ""),
            y_value: Number(e.detail.yValue || 0),
          },
        });
        const t = response?.content?.find((c) => c.type === "text");
        if (t) {
          try {
            const r = JSON.parse(t.text);
            if (r.action === "insight" && r.message) {
              const bar = document.getElementById("insight-bar");
              bar.textContent = r.message;
              bar.style.display = "block";
            }
          } catch {}
        }
      } catch (err) {
        console.log("Click handler:", err);
      }
    });

    // Receive tool results from LLM
    app.ontoolresult = async ({ content }) => {
      const textContent = content?.find((c) => c.type === "text");
      if (!textContent) return;

      let result;
      try {
        result = JSON.parse(textContent.text);
      } catch {
        return;
      }

      const container = document.getElementById("chart-container");

      if (result.action === "create" && result.figure) {
        currentVizId = result.viz_id || null;
        container.innerHTML = '<div class="loading"><div class="spinner"></div><span>Rendering chart...</span></div>';
        try {
          container.innerHTML = "";
          await Bokeh.embed.embed_item(result.figure);
          document.getElementById("status").textContent = result.name || "Visualization created";
          document.getElementById("insight-bar").style.display = "none";
        } catch (err) {
          container.innerHTML = '<div class="error-box">Render error: ' + err.message + '</div>';
          document.getElementById("status").textContent = "Render error";
        }
      } else if (result.action === "error") {
        const msg = result.message || "Unknown error";
        if (result.url) {
          container.innerHTML =
            '<div style="padding:30px;text-align:center;font-size:14px;">' +
            '<p style="margin-bottom:12px;">' + (result.name || "Visualization") + '</p>' +
            '<a href="' + result.url + '" target="_blank" style="color:var(--accent);text-decoration:underline;">Open interactive visualization</a>' +
            '</div>';
        } else {
          container.innerHTML = '<div class="error-box">' + msg + '</div>';
        }
        document.getElementById("status").textContent = result.name || "Error";
      }

      if (result.action === "insight" && result.message) {
        const bar = document.getElementById("insight-bar");
        bar.textContent = result.message;
        bar.style.display = "block";
      }
    };

    await app.connect();
    document.getElementById("status").textContent = "Connected - ready";
  </script>
</body>
</html>
