<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <title>HoloViz MCP App — Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e0e0e0; --text-muted: #94a3b8; --accent: #818cf8;
      --success: #4ade80; --warning: #fbbf24; --danger: #f87171;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 0; overflow: hidden; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .toolbar button {
      background: transparent; color: var(--text-muted); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .toolbar button:hover { background: var(--border); color: var(--text); }
    .toolbar .spacer { flex: 1; }
    .toolbar .status { font-size: 11px; color: var(--text-muted); }

    /* Iframe container */
    #viz-frame {
      width: 100%; border: none; background: var(--bg);
    }

    /* Insight bar */
    #insight-bar {
      display: none; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3);
      border-radius: 6px; padding: 8px 12px; margin: 6px 10px; font-size: 13px;
      color: #93c5fd; white-space: pre-line;
    }

    /* Loading state */
    .loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; min-height: 300px; color: var(--text-muted); font-size: 13px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    /* Zoom levels */
    .zoom-100 { transform: scale(1); transform-origin: top left; }
    .zoom-75 { transform: scale(0.75); transform-origin: top left; width: 133.33%; }
    .zoom-50 { transform: scale(0.50); transform-origin: top left; width: 200%; }
    .zoom-25 { transform: scale(0.25); transform-origin: top left; width: 400%; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="btn-theme" title="Toggle theme">🌓 Theme</button>
    <button id="btn-zoom-out" title="Zoom out">−</button>
    <button id="btn-zoom-in" title="Zoom in">+</button>
    <span id="zoom-label" class="status">100%</span>
    <div class="spacer"></div>
    <span id="status" class="status">Connecting...</span>
  </div>

  <div id="viz-container">
    <div class="loading">
      <div class="spinner"></div>
      <span>Preparing visualization...</span>
    </div>
  </div>

  <div id="insight-bar"></div>

  <script type="module">
    import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";

    const app = new App({ name: "HoloViz MCP App", version: "0.1.0" });
    let currentUrl = null;
    let currentZoom = 100;
    let isDark = true;
    const zoomLevels = [25, 50, 75, 100];

    function updateZoom() {
      const frame = document.getElementById("viz-frame");
      if (!frame) return;
      frame.className = `zoom-${currentZoom}`;
      document.getElementById("zoom-label").textContent = `${currentZoom}%`;

      // Adjust frame height based on zoom
      const baseHeight = window.innerHeight - 60;
      frame.style.height = `${baseHeight / (currentZoom / 100)}px`;
    }

    document.getElementById("btn-zoom-in").addEventListener("click", () => {
      const idx = zoomLevels.indexOf(currentZoom);
      if (idx < zoomLevels.length - 1) {
        currentZoom = zoomLevels[idx + 1];
        updateZoom();
      }
    });

    document.getElementById("btn-zoom-out").addEventListener("click", () => {
      const idx = zoomLevels.indexOf(currentZoom);
      if (idx > 0) {
        currentZoom = zoomLevels[idx - 1];
        updateZoom();
      }
    });

    document.getElementById("btn-theme").addEventListener("click", async () => {
      isDark = !isDark;
      document.documentElement.style.setProperty("--bg", isDark ? "#0f172a" : "#ffffff");
      document.documentElement.style.setProperty("--surface", isDark ? "#1e293b" : "#f1f5f9");
      document.documentElement.style.setProperty("--border", isDark ? "#334155" : "#cbd5e1");
      document.documentElement.style.setProperty("--text", isDark ? "#e0e0e0" : "#1e293b");
      document.documentElement.style.setProperty("--text-muted", isDark ? "#94a3b8" : "#64748b");
    });

    // Handle click events from iframe (bidirectional communication)
    window.addEventListener("message", async (e) => {
      if (e.data?.type === "bokeh-tap" && e.data?.vizId) {
        try {
          const response = await app.callServerTool({
            name: "handle_interaction",
            arguments: {
              viz_id: e.data.vizId,
              point_index: e.data.index || 0,
              x_value: String(e.data.xValue || ""),
              y_value: Number(e.data.yValue || 0),
            },
          });
          const t = response?.content?.find((c) => c.type === "text");
          if (t) {
            try {
              const r = JSON.parse(t.text);
              if (r.insight) {
                const bar = document.getElementById("insight-bar");
                bar.textContent = r.insight;
                bar.style.display = "block";
              }
            } catch {}
          }
        } catch (err) {
          console.log("Click handler:", err);
        }
      }
    });

    // LLM-initiated: receive tool results
    app.ontoolresult = async ({ content }) => {
      const textContent = content?.find((c) => c.type === "text");
      if (!textContent) return;

      let result;
      try {
        result = JSON.parse(textContent.text);
      } catch {
        return;
      }

      if (result.url) {
        currentUrl = result.url;
        const container = document.getElementById("viz-container");

        // Set zoom from payload
        if (result.zoom) {
          currentZoom = result.zoom;
        }

        // Create iframe pointing to the Panel server
        container.innerHTML = "";
        const frame = document.createElement("iframe");
        frame.id = "viz-frame";
        frame.src = result.url;
        frame.style.border = "none";
        frame.style.width = "100%";
        container.appendChild(frame);

        updateZoom();

        document.getElementById("status").textContent = result.name || "Visualization loaded";
        document.getElementById("insight-bar").style.display = "none";
      }

      if (result.insight) {
        const bar = document.getElementById("insight-bar");
        bar.textContent = result.insight;
        bar.style.display = "block";
      }

      if (result.error) {
        document.getElementById("viz-container").innerHTML =
          `<div style="color:var(--danger);text-align:center;padding:40px;">${result.error}</div>`;
      }
    };

    await app.connect();
    document.getElementById("status").textContent = "Connected — ready";
  </script>
</body>
</html>
